<!DOCTYPE html>
<html lang="ku">

<head>
    <meta charset="UTF-8">
    <title>KRINO SHOP</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #789cb2, #04304b);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 45px;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .logo {
            width: 120px;
            border-radius: 50%;
        }

        h1 {
            margin-top: 10px;
        }

        button {
            height: 40px;
            width: 200px;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            transition: 0.3s;
            font-family: revert;
        }

        .b1:hover {
            background: linear-gradient(to right, #672b88, #c52162, #c1832d);
            transform: scale(1.05);
        }

        .b2:hover {
            background: linear-gradient(to right, #0b58b6, #1c8ed0);
            transform: scale(1.05);
        }

        .b3:hover {
            background: linear-gradient(to right, #323232);
            transform: scale(1.05);
        }

        .icon{
            width: 17px;
            height: 17px;
        }

        .b1{
            background: linear-gradient(to right, #6e2d91, #ef2676, #faaa37);
        }

        .b2{
            background: linear-gradient(to right, #0b6feb, #22abfc);
        }

        .b3{
            background: linear-gradient(to right, #080808);
        }
    </style>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">
        <img class="logo" src="img/krino_logo.jpg">

        <h1>KRINO - کڕینۆ</h1>

        <p>بەخێربێیت بۆ ماڵپەڕەکانی کڕینۆ <br>
            کلیك بکە بۆ پەیوەندی کردن</p>

        <button onclick="document.location='https://www.instagram.com/krin0o?igsh=MTFqYjU2eXNsNnVzMw=='" class="b1"><img
                src="img/instagram_icon.png" class="icon"> Instagram - ئینستاگرام</button>

        <button onclick="document.location='https://www.facebook.com/share/1AQvKi7AG2/'" class="b2"><img
                src="img/facebook_icon.png" class="icon"> Facebook - فەیسبووك</button>

        <button onclick="document.location='https://www.tiktok.com/@krinoo0?_r=1&_t=ZS-941KjHZV1i4'" class="b3"><img
                src="img/tiktok_icon.png" class="icon"> Tiktok - تیکتۆك</button><br>

    </div>

</body>

</html>
